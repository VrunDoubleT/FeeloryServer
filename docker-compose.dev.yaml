services:
  feelory_backend:
    container_name: feelory_backend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development

      ConnectionStrings__DefaultConnection: >
        Server=feelory_sqlserver,1433;
        Database=${DB_NAME};
        User Id=sa;
        Password=${SA_PASSWORD};
        TrustServerCertificate=True;

      Redis__ConnectionString: >
        feelory_redis:6379,password=${REDIS_PASSWORD}

      RabbitMQ__Host: feelory_rabbitmq
      RabbitMQ__Username: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}

    depends_on:
      feelory_sqlserver:
        condition: service_healthy

      feelory_redis:
        condition: service_healthy

      feelory_rabbitmq:
        condition: service_healthy

  feelory_sqlserver:
    container_name: feelory_sqlserver
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
    ports:
      - "${SQL_PORT}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SA_PASSWORD}' -Q 'SELECT 1' -C || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 15

  feelory_redis:
    container_name: feelory_redis
    image: redis:7.4-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 15

  feelory_rabbitmq:
    container_name: feelory_rabbitmq
    image: rabbitmq:3-management
    hostname: feelory_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_UI_PORT}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 15

volumes:
  sqlserver_data:
  redis_data:
  rabbitmq_data: